services:
  kozitabor-db:
    image: postgres:15-alpine
    container_name: kozitabor-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - kozitabor_postgres_data:/var/lib/postgresql/data

  kozitabor-api:
    image: kozitabor-api:latest
    container_name: kozitabor-api
    environment:
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASS}@kozitabor-db:5432/${DB_NAME}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      API_PORT: ${API_PORT}
      CLIENT_URL: ${CLIENT_URL}
      CLIENT_PORT: ${CLIENT_PORT}
    restart: always
    depends_on:
      kozitabor-db:
        condition: service_healthy
    env_file:
      - .env

  kozitabor-react:
    image: kozitabor-react:latest
    container_name: kozitabor-react
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kozitabor-api

volumes:
  kozitabor_postgres_data: